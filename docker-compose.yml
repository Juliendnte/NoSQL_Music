services:
  neo4j:
    image: neo4j:5.24-community
    container_name: musicgraph-neo4j
    ports:
      - "7474:7474"   # interface web Neo4j Browser
      - "7687:7687"   # protocole bolt (utilisé par le backend)
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: ./back
    container_name: musicgraph-api
    env_file: .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
    ports:
      - "8000:8000"
    volumes:
      - ./back/api:/app/api
    depends_on:
      neo4j:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: musicgraph-frontend
    env_file: .env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  neo4j_data:
